# Local Postgres for development. Start with: docker compose up -d
# Connection: postgres://booklog:booklog@localhost:5432/booklog
services:
  db:
    image: postgres:16
    container_name: booklog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: booklog
      POSTGRES_PASSWORD: booklog
      POSTGRES_DB: booklog
    ports:
      - "5432:5432"
    volumes:
      - booklog_pgdata:/var/lib/postgresql/data

volumes:
  booklog_pgdata:
